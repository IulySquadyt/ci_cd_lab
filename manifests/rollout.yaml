apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
      - setWeight: 25
      - pause: {duration: 120s}
      - setWeight: 75
      - pause: {duration: 120s}
      - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
      - name: webserver
        image: ghcr.io/iulysquadyt/ci_cd_lab@sha256:d32a66ba13cb2b6dcbd4c089175f024327209e2f853e686ca777f54b5299a811
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
