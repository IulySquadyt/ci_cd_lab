apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/iulysquadyt/ci_cd_lab@sha256:d5cfc638215742bf66f1955abf47e7116c35618a653cb4b714ec6eefca466181
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
